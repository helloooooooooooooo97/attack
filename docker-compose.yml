# 精简可运行版：靶标 + Suricata + EveBox + 可选 CTFd
# Wazuh 较重，用 profile wazuh 按需启动（需先 make certs）

name: redblue

networks:
  net-red:
    driver: bridge
  net-target:
    driver: bridge
  net-blue:
    driver: bridge

volumes:
  suricata-logs:
  nginx-logs:
  ctfd-data:
  ctfd-mysql:

services:
  gateway:
    image: nginx:1.27-alpine
    container_name: rb-gateway
    ports:
      - "${DVWA_PORT:-8080}:8080"
      - "${JUICE_PORT:-3000}:3000"
      - "${INTRANET_PORT:-8081}:8081"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-logs:/var/log/nginx
    networks:
      - net-red
      - net-target
    depends_on:
      - dvwa
      - juice-shop
      - intranet
    restart: unless-stopped

  dvwa:
    image: vulnerables/web-dvwa:latest
    container_name: rb-dvwa
    networks:
      - net-target
    restart: unless-stopped

  juice-shop:
    image: bkimminich/juice-shop:v17.1.1
    container_name: rb-juice
    networks:
      - net-target
    restart: unless-stopped

  intranet:
    build: ./targets/intranet
    container_name: rb-intranet
    environment:
      INTRANET_USER: ${INTRANET_USER:-admin}
      INTRANET_PASSWORD: ${INTRANET_PASSWORD:-admin123}
    networks:
      - net-target
    restart: unless-stopped

  attacker:
    image: instrumentisto/nmap:latest
    container_name: rb-attacker
    profiles: ["red"]
    stdin_open: true
    tty: true
    networks:
      - net-red
    command: ["sleep", "infinity"]
    restart: unless-stopped

  # Suricata 与 gateway 共享网络栈，抓入口流量
  suricata:
    image: jasonish/suricata:7.0.7
    container_name: rb-suricata
    network_mode: "service:gateway"
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    volumes:
      - ./blue/suricata/suricata.yaml:/config/suricata.yaml:ro
      - ./blue/suricata/rules:/var/lib/suricata/rules:ro
      - suricata-logs:/var/log/suricata
    # 绕过官方 entrypoint 的 chown（Mac bind mount 只读会失败）
    entrypoint: ["/usr/bin/suricata"]
    command: ["-c", "/config/suricata.yaml", "-i", "eth0"]
    depends_on:
      - gateway
    restart: unless-stopped

  # 蓝队轻量看板（Suricata eve.json）
  evebox:
    image: jasonish/evebox:0.18.2
    container_name: rb-evebox
    ports:
      - "${EVEBOX_PORT:-5636}:5636"
    volumes:
      - suricata-logs:/var/log/suricata:ro
    # 使用镜像默认 entrypoint；--sqlite 读本地 eve.json，关闭 TLS/登录方便实验室
    command:
      [
        "--host", "0.0.0.0",
        "--sqlite",
        "--input", "/var/log/suricata/eve.json",
        "--no-tls",
        "--no-auth",
      ]
    networks:
      - net-blue
      - net-red
    depends_on:
      - suricata
    restart: unless-stopped

  # 将 nginx 访问日志 + Suricata 告警汇到可查看的日志容器（蓝队辅助）
  blue-collector:
    image: alpine:3.20
    container_name: rb-blue-collector
    volumes:
      - suricata-logs:/var/log/suricata:ro
      - nginx-logs:/var/log/nginx:ro
      - ./blue/collector/watch.sh:/watch.sh:ro
    networks:
      - net-blue
    command: ["sh", "/watch.sh"]
    depends_on:
      - gateway
      - suricata
    restart: unless-stopped

  ctfd-db:
    image: mariadb:10.11
    container_name: rb-ctfd-db
    profiles: ["ctfd"]
    environment:
      MYSQL_ROOT_PASSWORD: ctfdroot
      MYSQL_USER: ctfd
      MYSQL_PASSWORD: ctfd
      MYSQL_DATABASE: ctfd
    volumes:
      - ctfd-mysql:/var/lib/mysql
    networks:
      - net-blue
    restart: unless-stopped

  ctfd-redis:
    image: redis:7-alpine
    container_name: rb-ctfd-redis
    profiles: ["ctfd"]
    networks:
      - net-blue
    restart: unless-stopped

  ctfd:
    image: ctfd/ctfd:3.7.4
    container_name: rb-ctfd
    profiles: ["ctfd"]
    ports:
      - "${CTFD_PORT:-8000}:8000"
    environment:
      UPLOAD_FOLDER: /var/uploads
      DATABASE_URL: mysql+pymysql://ctfd:ctfd@ctfd-db/ctfd
      REDIS_URL: redis://ctfd-redis:6379
      SECRET_KEY: redblue-lab-secret-change-me
    volumes:
      - ctfd-data:/var/uploads
    networks:
      - net-blue
      - net-red
    depends_on:
      - ctfd-db
      - ctfd-redis
    restart: unless-stopped
